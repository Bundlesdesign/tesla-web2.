        .vehicle-card {

            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .vehicle-card:hover {
            transform: translateY(-5px);
        }
        .vehicle-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .price {
            font-size: 18px;
            font-weight: bold;
        }
        .original-price {
            text-decoration: line-through;
            color: #666;
        }
        .discounted-price {
            color: #e10600;
        }
    </style>
</head>
